<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Módulo Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🧪 Teste do Módulo Cliente - Versão Simplificada</h1>

    <div id="test-results"></div>

    <h2>Teste do CEP Automático</h2>
    <div style="margin-bottom: 20px;">
        <label>CEP:</label>
        <input id="cli-form-cep" type="text" placeholder="00000-000" maxlength="9">
        <button onclick="buscarCepCliente()">🔍 Buscar</button>
    </div>

    <div>
        <label>Rua:</label>
        <input id="cli-form-rua" type="text" placeholder="Rua">
    </div>
    <div>
        <label>Bairro:</label>
        <input id="cli-form-bairro" type="text" placeholder="Bairro">
    </div>
    <div>
        <label>Cidade:</label>
        <input id="cli-form-cidade" type="text" placeholder="Cidade">
    </div>

    <script>
        const results = document.getElementById('test-results');

        function log(message, success = true) {
            const div = document.createElement('div');
            div.className = 'test-result ' + (success ? 'success' : 'error');
            div.textContent = message;
            results.appendChild(div);
        }

        function toast(message, type) {
            log(`Toast ${type}: ${message}`, type === 'ok');
        }

        // Função buildClientAddress (simplificada)
        function buildClientAddress({ rua, numero, bairro, cidade, complemento, referencia }) {
            const parts = [];
            if (rua) parts.push(rua);
            if (numero) parts.push(numero);
            if (bairro) parts.push(bairro);
            if (cidade) parts.push(cidade);
            return parts.join(', ');
        }

        // Função buscarCepCliente
        async function buscarCepCliente() {
            try {
                log('🔍 Iniciando busca de CEP...');

                const cepInput = document.getElementById('cli-form-cep');
                const cep = cepInput.value.replace(/\D/g, '');

                log(`CEP digitado: ${cep}`);

                if (cep.length !== 8) {
                    toast('CEP deve ter 8 dígitos', 'warn');
                    return;
                }

                toast('🔍 Buscando endereço...', 'ok');

                // Usar API do ViaCEP
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                log(`Resposta da API: ${JSON.stringify(data)}`);

                if (data.erro) {
                    toast('CEP não encontrado', 'err');
                    return;
                }

                // Preencher campos automaticamente
                document.getElementById('cli-form-rua').value = data.logradouro || '';
                document.getElementById('cli-form-bairro').value = data.bairro || '';
                document.getElementById('cli-form-cidade').value = data.localidade || '';

                // Formatar CEP
                cepInput.value = cep.replace(/(\d{5})(\d{3})/, '$1-$2');

                toast('✅ Endereço preenchido automaticamente', 'ok');
                log('✅ CEP processado com sucesso!', true);

            } catch (error) {
                log(`❌ Erro: ${error.message}`, false);
                toast('Erro ao buscar CEP', 'err');
            }
        }

        // Teste inicial
        log('✅ Página carregada com sucesso');
        log('✅ Função buscarCepCliente definida');

        // Teste automático
        setTimeout(() => {
            log('🚀 Executando teste automático...');
            document.getElementById('cli-form-cep').value = '01310100';
            buscarCepCliente();
        }, 1000);
    </script>
</body>
</html>
