<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letec · Sistema de Logística v7.8</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f4f6fb;
  --bg2:      #ffffff;
  --surface:  #eef1f8;
  --card:     #ffffff;
  --card2:    #f8f9fd;
  --border:   #e2e8f0;
  --border2:  #cbd5e1;
  --border3:  #94a3b8;

  --blue:     #2563eb;
  --blue2:    #1d4ed8;
  --blue-bg:  rgba(37,99,235,.08);
  --green:    #16a34a;
  --green2:   #15803d;
  --green-bg: rgba(22,163,74,.08);
  --orange:   #ea580c;
  --orange-bg:rgba(234,88,12,.08);
  --red:      #dc2626;
  --red-bg:   rgba(220,38,38,.08);
  --yellow:   #b45309;
  --yellow-bg:rgba(180,83,9,.08);
  --purple:   #7c3aed;
  --purple-bg: rgba(124,58,237,.08);
  --cyan:     #0891b2;

  --text:     #0f172a;
  --text2:    #475569;
  --text3:    #94a3b8;
  --text4:    #cbd5e1;

  --mono:     'JetBrains Mono', monospace;
  --display:  'Cabinet Grotesk', sans-serif;
  --body:     'Instrument Sans', sans-serif;
  --r:        10px;
  --r2:       6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border3); }

/* ─── SIDEBAR ────────────────────────────────── */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 50;
  transition: width .25s ease;
}
.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  background: var(--blue);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.logo-text {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 900;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.logo-text span { color: var(--blue2); }
.logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
.logo-sub-version::after { content: 'v7.8 · 2026'; }

.nav-section-label {
  padding: 16px 16px 6px;
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text4);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  margin: 1px 8px;
  border-radius: var(--r2);
  cursor: pointer;
  transition: all .15s;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  position: relative;
  border: none;
  background: none;
  width: calc(100% - 16px);
  text-align: left;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--blue-bg); color: var(--blue2); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -8px; top: 4px; bottom: 4px;
  width: 3px;
  background: var(--blue);
  border-radius: 0 2px 2px 0;
}
.nav-item .ico { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--blue);
  color: white;
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 99px;
  min-width: 22px;
  text-align: center;
}
.nav-badge.orange { background: var(--orange); }
.nav-badge.green  { background: var(--green); }

.sidebar-footer {
  margin-top: auto;
  padding: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}

/* ─── MAIN ────────────────────────────────────── */
.main {
  margin-left: 220px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── TOPBAR ──────────────────────────────────── */
.topbar {
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 40;
}
.topbar-title {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.topbar-sub { font-size: 12px; color: var(--text3); }
.topbar-sep { flex: 1; }
.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  transition: all .15s;
  font-family: var(--body);
}
.topbar-btn:hover { border-color: var(--border3); color: var(--text); }
.topbar-btn.primary { background: var(--blue); border-color: var(--blue); color: white; }
.topbar-btn.primary:hover { background: #3a7ae4; }

/* ─── CONTENT ─────────────────────────────────── */
.content { flex: 1; padding: 24px; }

/* ─── PAGE VISIBILITY ─────────────────────────── */
.page { display: none; }
.page.active { display: block; }

/* ─── SECTION TITLE ───────────────────────────── */
.section-title {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.section-sub {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
  margin-bottom: 20px;
}

/* ─── GRID LAYOUTS ────────────────────────────── */
.grid-kpi  { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.grid-2    { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3    { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-2-3  { display: grid; grid-template-columns: 2fr 3fr; gap: 16px; }
.grid-3-2  { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }

/* ─── CARD ────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.card-accent { border-top: 2px solid var(--blue); }
.card-green  { border-top: 2px solid var(--green); }
.card-orange { border-top: 2px solid var(--orange); }
.card-red    { border-top: 2px solid var(--red); }
.card-label {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin-bottom: 6px;
}
.card-value {
  font-family: var(--display);
  font-size: 34px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
}
.cv-blue   { color: var(--blue2); }
.cv-green  { color: var(--green); }
.cv-orange { color: var(--orange); }
.cv-red    { color: var(--red); }
.cv-yellow { color: var(--yellow); }
.card-trend {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-trend.up   { color: var(--green); }
.card-trend.down { color: var(--red); }

/* ─── CHIP / BADGE ────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.chip-blue    { background: var(--blue-bg);   color: var(--blue2);  border: 1px solid rgba(79,142,247,.25); }
.chip-green   { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(45,214,123,.25); }
.chip-orange  { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(255,140,66,.25); }
.chip-red     { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(255,83,112,.25); }
.chip-yellow  { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(255,209,102,.25); }
.chip-gray    { background: rgba(139,150,176,.1); color: var(--text2); border: 1px solid var(--border2); }
.chip-purple  { background: rgba(192,132,252,.1); color: var(--purple); border: 1px solid rgba(192,132,252,.25); }
.chip-cyan    { background: rgba(34,211,238,.08); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }

/* ─── SERVICE CARD ────────────────────────────── */
.svc-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  transition: all .15s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.svc-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
/* legacy eq-* CSS removed in v7.2 */
.svc-card:hover { border-color: var(--border3); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.svc-card.st-executado { opacity: .65; }
.svc-card.st-reagendado .svc-cliente { text-decoration: line-through; color: var(--text3); }

.svc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.svc-cliente { font-weight: 600; font-size: 13px; color: var(--text); line-height: 1.3; }
.svc-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.svc-hora { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.svc-escopo { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.svc-actions { display: flex; gap: 6px; margin-top: 10px; }
.svc-btn {
  padding: 4px 10px;
  border-radius: var(--r2);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  transition: all .12s;
  font-family: var(--body);
}
.svc-btn:hover  { border-color: var(--border3); color: var(--text); }
.svc-btn.exec   { background: var(--green-bg); border-color: rgba(45,214,123,.3); color: var(--green); }
.svc-btn.reagend { background: var(--orange-bg); border-color: rgba(255,140,66,.3); color: var(--orange); }
.svc-btn.cancel  { background: var(--red-bg); border-color: rgba(255,83,112,.3); color: var(--red); }

/* ─── EQUIPE LABELS ───────────────────────────── */
/* legacy .eq-* color classes removed in v7.2 */

/* ─── TABLE ───────────────────────────────────── */
.tbl-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--bg2);
  padding: 9px 14px;
  text-align: left;
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }
tbody td { padding: 9px 14px; color: var(--text2); font-size: 12px; }
td.mono { font-family: var(--mono); font-size: 11px; }
td.bold { color: var(--text); font-weight: 600; }

/* ─── FORM ────────────────────────────────────── */
.form-row { display: grid; gap: 14px; margin-bottom: 14px; }
.fr-2 { grid-template-columns: 1fr 1fr; }
.fr-3 { grid-template-columns: 1fr 1fr 1fr; }
.fr-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
}
.field input, .field select, .field textarea {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,142,247,.1);
}
.field select option { background: var(--surface); }

/* ─── BTN ─────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px;
  border-radius: var(--r2);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  border: none;
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #3a7ae4; }
.btn-green   { background: var(--green); color: #0a1a10; }
.btn-green:hover   { background: var(--green2); }
.btn-ghost   { background: var(--card); border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover   { border-color: var(--border3); color: var(--text); }
.btn-danger  { background: var(--red-bg); border: 1px solid rgba(255,83,112,.3); color: var(--red); }
.btn-sm { padding: 6px 13px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; }

/* ─── BAR CHART ───────────────────────────────── */
.bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 90px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.bar-fill { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
.bar-lbl { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.bar-val { font-family: var(--mono); font-size: 9px; color: var(--text2); }

/* ─── PROGRESS ────────────────────────────────── */
.prog { background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; margin-top: 5px; }
.prog-fill { height: 100%; border-radius: 99px; }

/* ─── TIMELINE DAY VIEW ───────────────────────── */
.day-col {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.day-col-head {
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.day-col-name { font-family: var(--display); font-weight: 800; font-size: 14px; }
.day-col-count { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.day-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

/* ─── KM ROUTE BOX ────────────────────────────── */
.route-box {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
}
.route-title {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.route-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.route-item:last-child { border-bottom: none; }
.route-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.route-client { font-weight: 600; font-size: 12px; color: var(--text); flex: 1; }
.route-time { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.route-km { font-family: var(--mono); font-size: 11px; color: var(--blue2); margin-left: auto; }

/* ─── STATUS SELECTOR ─────────────────────────── */
.status-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.st-btn {
  padding: 5px 12px;
  border-radius: 99px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  border: 1.5px solid var(--border2);
  background: none;
  color: var(--text3);
  transition: all .12s;
}
.st-btn:hover { border-color: var(--border3); color: var(--text2); }
.st-btn.active { font-weight: 700; }
.st-btn.st-agendado.active   { background: var(--blue-bg);   border-color: var(--blue);   color: var(--blue2); }
.st-btn.st-executado.active  { background: var(--green-bg);  border-color: var(--green);  color: var(--green); }
.st-btn.st-reagendado.active { background: var(--orange-bg); border-color: var(--orange); color: var(--orange); }
.st-btn.st-cancelado.active  { background: var(--red-bg);    border-color: var(--red);    color: var(--red); }

/* ─── MODAL ───────────────────────────────────── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border2); border-radius:var(--r); padding:24px; width:90%; max-width:560px; max-height:90vh; overflow-y:auto; }
.modal-title { font-family:var(--display); font-size:18px; font-weight:800; margin-bottom:18px; letter-spacing:-0.3px; }

/* ─── VEHICLE BTNS ────────────────────────────── */
.veh-grid { display:flex; gap:8px; flex-wrap:wrap; }
.veh-btn {
  background:var(--bg2); border:2px solid var(--border2); border-radius:var(--r2);
  color:var(--text2); font-family:var(--mono); font-size:11px;
  padding:9px 14px; cursor:pointer; transition:all .12s;
  display:flex; flex-direction:column; align-items:center; gap:3px; min-width:68px;
}
.veh-btn .vi { font-size:20px; }
.veh-btn:hover { border-color:var(--blue); color:var(--blue2); }
.veh-btn.sel { background:var(--blue-bg); border-color:var(--blue); color:var(--blue2); }

/* ─── FUEL BTNS ───────────────────────────────── */
.fuel-grid { display:flex; gap:7px; flex-wrap:wrap; }
.fuel-btn { background:var(--bg2); border:2px solid var(--border2); border-radius:var(--r2); color:var(--text2); font-family:var(--mono); font-size:11px; padding:7px 13px; cursor:pointer; transition:all .12s; }
.fuel-btn:hover,.fuel-btn.sel { background:var(--green-bg); border-color:var(--green); color:var(--green); }
.fuel-btn.low:hover,.fuel-btn.low.sel { background:var(--red-bg); border-color:var(--red); color:var(--red); }

/* ─── EQUIP ITEMS ─────────────────────────────── */
.equip-tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
.etab { padding:5px 12px; border-radius:99px; font-family:var(--mono); font-size:10px; font-weight:500; cursor:pointer; border:1.5px solid var(--border2); background:none; color:var(--text3); transition:all .12s; text-transform:uppercase; }
.etab:hover { border-color:var(--blue); color:var(--blue2); }
.etab.active { background:var(--blue); border-color:var(--blue); color:white; }
.ecat { display:none; }
.ecat.active { display:block; }
.ecat-lbl { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); margin-bottom:10px; }
.equip-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:7px; }
.eitem { display:flex; align-items:center; gap:9px; padding:9px 11px; background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--r2); cursor:pointer; transition:all .12s; user-select:none; }
.eitem:hover { border-color:var(--border2); }
.eitem.chk { background:var(--green-bg); border-color:rgba(45,214,123,.35); }
.eitem input[type=checkbox] { width:15px; height:15px; accent-color:var(--green); flex-shrink:0; cursor:pointer; }
.eitem span { font-size:12px; color:var(--text2); line-height:1.3; }
.eitem.chk span { color:var(--green); }

/* ─── KM DISPLAY ──────────────────────────────── */
.km-row { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r); margin-top:12px; }
.km-num { font-family:var(--mono); font-size:26px; font-weight:700; color:var(--blue2); }
.km-arrow { color:var(--text3); font-size:18px; }
.km-delta-val { font-family:var(--mono); font-size:14px; color:var(--green); margin-left:auto; }
.km-lbl { font-size:10px; color:var(--text3); }

/* ─── MISC ────────────────────────────────────── */
.flex { display:flex; }
.ic { align-items:center; }
.sb { justify-content:space-between; }
.gap1 { gap:4px; } .gap2 { gap:8px; } .gap3 { gap:12px; } .gap4 { gap:16px; }
.mb1 { margin-bottom:6px; } .mb2 { margin-bottom:10px; } .mb3 { margin-bottom:14px; } .mb4 { margin-bottom:20px; } .mb5 { margin-bottom:28px; }
.mt2 { margin-top:10px; } .mt3 { margin-top:14px; } .mt4 { margin-top:20px; }
.w100 { width:100%; }
.text-muted { color:var(--text3); font-size:11px; }
.text-blue { color:var(--blue2); }
.text-green { color:var(--green); }
.text-orange { color:var(--orange); }
.text-red { color:var(--red); }
.font-mono { font-family:var(--mono); }
.divider { height:1px; background:var(--border); margin:18px 0; }
.note { background:var(--blue-bg); border:1px solid rgba(79,142,247,.2); border-radius:var(--r2); padding:12px 14px; font-size:12px; color:var(--text2); line-height:1.6; }
.note strong { color:var(--blue2); }
.avaria-toggle { display:flex; align-items:center; gap:9px; padding:10px 14px; background:var(--bg2); border:2px solid var(--border2); border-radius:var(--r2); cursor:pointer; transition:all .12s; }
.avaria-toggle:hover,.avaria-toggle.on { border-color:var(--orange); }
.avaria-toggle.on { background:var(--orange-bg); color:var(--orange); }
.avaria-toggle input[type=checkbox] { width:15px; height:15px; accent-color:var(--orange); }

/* ─── TOAST ───────────────────────────────────── */
.toast-wrap { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:7px; }
.toast { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:11px 15px; display:flex; align-items:center; gap:9px; font-size:12px; color:var(--text); box-shadow:0 8px 28px rgba(0,0,0,.5); animation:tst .25s ease; max-width:300px; }
.toast.ok  { border-left:3px solid var(--green); }
.toast.err { border-left:3px solid var(--red); }
.toast.warn { border-left:3px solid var(--orange); }
@keyframes tst { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ─── FILTER BAR ──────────────────────────────── */
.filter-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
.fsel { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r2); color:var(--text); font-family:var(--body); font-size:12px; padding:7px 11px; outline:none; }
.fsel:focus { border-color:var(--blue); }
.fsel option { background:var(--surface); }
.finput { background:var(--bg2); border:1px solid var(--border2); border-radius:var(--r2); color:var(--text); font-size:12px; padding:7px 11px; outline:none; }
.finput:focus { border-color:var(--blue); }

/* ─── AGENDA KANBAN ───────────────────────────── */
.kanban { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.kan-col { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.kan-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.kan-title { font-family:var(--display); font-size:14px; font-weight:800; }
.kan-count { font-family:var(--mono); font-size:11px; color:var(--text3); }
.kan-body { padding:10px; display:flex; flex-direction:column; gap:8px; max-height:520px; overflow-y:auto; }

/* ─── RESPONSIVE ──────────────────────────────── */
@media(max-width:1100px) {
  .kanban { grid-template-columns:1fr; }
  .grid-2,.grid-3,.grid-2-3,.grid-3-2 { grid-template-columns:1fr; }
  .grid-3-resp { grid-template-columns: 1fr !important; }
}
@media(max-width:768px) {
  .sidebar { width:64px; }
  .logo-text,.logo-sub,.nav-item span:not(.ico),.nav-badge,.nav-section-label,.sidebar-footer { display:none; }
  .main { margin-left:64px; }
  .grid-kpi { grid-template-columns:1fr 1fr; }
  .fr-2,.fr-3,.fr-4 { grid-template-columns:1fr; }
}
/* ─── MOBILE (≤480px) ─────────────────────────── */
/* Sidebar overlay + drawer */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 49;
}
.sidebar-overlay.open { display: block; }
/* Hamburger button in topbar */
.mob-hamburger {
  display: none;
  align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  background: var(--card);
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
}
/* Bottom navigation bar */
.mob-bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 60px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  z-index: 48;
  align-items: center;
  justify-content: space-around;
  padding: 0 4px;
}
.mob-nav-item {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  flex: 1;
  padding: 8px 2px;
  border: none; background: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 10px;
  font-family: var(--body);
  border-radius: var(--r2);
  transition: color .15s;
  position: relative;
}
.mob-nav-item .mob-ico { font-size: 20px; line-height: 1; }
.mob-nav-item.active { color: var(--blue2); }
.mob-nav-item .mob-badge {
  position: absolute; top: 4px; right: 10px;
  background: var(--red); color: white;
  font-size: 9px; font-family: var(--mono);
  padding: 0 4px; border-radius: 99px;
  min-width: 14px; text-align: center;
  display: none;
}
.mob-nav-item .mob-badge.vis { display: block; }
.mob-nav-item .mob-label { font-size: 9px; line-height: 1; }
/* Agenda filter collapse */
.ag-filter-toggle {
  display: none;
  align-items: center; gap: 6px;
  padding: 7px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  background: var(--card);
  font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--text2);
  margin-bottom: 8px;
}
.ag-filter-fields { transition: max-height .25s ease, opacity .25s; }
.ag-filter-fields.collapsed { max-height: 0 !important; overflow: hidden; opacity: 0; }
@media(max-width:480px) {
  /* Sidebar becomes full drawer */
  .sidebar {
    width: 240px !important;
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 50;
    top: 0; bottom: 0;
  }
  .sidebar.mob-open { transform: translateX(0); }
  .logo-text,.logo-sub,.nav-item span:not(.ico),.nav-badge,.nav-section-label,.sidebar-footer { display: flex !important; }
  .nav-badge { display: flex !important; }
  .nav-section-label { display: block !important; }
  .sidebar-footer { display: flex !important; flex-direction: column; }
  /* Main fills full width */
  .main { margin-left: 0 !important; padding-bottom: 64px; }
  /* Topbar adjustments */
  .mob-hamburger { display: flex; }
  .topbar { gap: 6px; padding: 0 10px; }
  .topbar-sep { display: none; }
  #sync-indicator { display: none !important; }
  .topbar-btn[onclick*="showChangelog"] { display: none; }
  .topbar-btn[onclick*="exportCSV"] { display: none; }
  #page-sub { display: none; }
  #global-mes { max-width: 130px; font-size: 11px; }
  .topbar-btn.primary { font-size: 11px; padding: 5px 8px; }
  .topbar-btn.primary::before { content: "+"; }
  .topbar-title { font-size: 14px; }
  /* Bottom nav */
  .mob-bottom-nav { display: flex; }
  /* Agenda: filter toggle */
  .ag-filter-toggle { display: flex; }
  .ag-filter-fields { max-height: 500px; opacity: 1; }
  /* Agenda view buttons: compact */
  #page-agenda .flex.ic.sb { flex-wrap: wrap; gap: 8px; }
  #page-agenda .flex.gap2 { flex-wrap: wrap; gap: 6px; }
  /* Tables: horizontal scroll */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 600px; }
  /* Dashboard KPIs: 1 column */
  .grid-kpi { grid-template-columns: 1fr !important; }
  /* Cards: full width */
  .grid-2,.grid-3,.grid-2-3,.grid-3-2,.grid-3-resp { grid-template-columns: 1fr !important; }
  .kanban { grid-template-columns: 1fr !important; }
  .fr-2,.fr-3,.fr-4 { grid-template-columns: 1fr !important; }
  /* Content padding */
  .content { padding: 12px 10px; }
  /* Section title */
  .section-title { font-size: 16px; }
  /* Cards */
  .card { padding: 14px; }
  /* Filter bar */
  .filter-bar { flex-wrap: wrap; gap: 6px; }
  .filter-bar .finput { min-width: 0; width: 100%; }
  .filter-bar .fsel { min-width: 0; flex: 1; }
  /* Roteiro cards */
  .rot-card { padding: 10px; }
  /* Modal full height */
  .modal { width: 100% !important; max-width: 100% !important; margin: 0 !important; border-radius: var(--r) var(--r) 0 0 !important; max-height: 90vh !important; }
  .modal-bg { align-items: flex-end !important; padding: 0 !important; }
}

/* ─── CALENDÁRIO MENSAL (Agenda · Por Data) ──────────────── */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:12px; }
.cal-nav-center { text-align:center; flex:1; }
.cal-nav-title { font-family:var(--display); font-size:20px; font-weight:900; letter-spacing:-0.4px; }
.cal-nav-sub { font-size:11px; color:var(--text3); font-family:var(--mono); margin-top:3px; }
.cal-nav-btn { padding:7px 14px; border:1px solid var(--border2); border-radius:var(--r2); background:var(--card); color:var(--text2); font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; font-family:var(--body); white-space:nowrap; }
.cal-nav-btn:hover { border-color:var(--blue); color:var(--blue2); background:var(--blue-bg); }
.cal-nav-btn.today-btn { background:var(--blue); border-color:var(--blue); color:white; padding:7px 10px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cal-dow { text-align:center; font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text3); padding:7px 0; font-weight:600; }
.cal-dow.weekend { color:var(--red); opacity:.65; }
.cal-cell { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); min-height:96px; padding:7px 8px; cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .15s; position:relative; overflow:hidden; }
.cal-cell:hover:not(.other-month):not(.no-svc) { border-color:var(--blue); box-shadow:0 0 0 2px rgba(37,99,235,.1); transform:translateY(-1px); }
.cal-cell.other-month { background:var(--bg); opacity:.4; cursor:default; pointer-events:none; }
.cal-cell.today { border-color:var(--blue) !important; border-width:2px; }
.cal-cell.today .cal-day-num { color:var(--blue2); }
.cal-cell.no-svc { cursor:default; }
.cal-cell.no-svc:hover { border-color:var(--border); box-shadow:none; transform:none; }
.cal-cell.past-pending { border-left:3px solid var(--red) !important; }
.cal-day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:3px; }
.cal-day-num { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--text2); }
.cal-day-alerts { display:flex; gap:2px; flex-wrap:wrap; }
.cal-alert-pip { font-size:8px; background:rgba(220,38,38,.12); color:var(--red); padding:1px 4px; border-radius:2px; font-family:var(--mono); }
.cal-alert-pip.warn { background:rgba(234,88,12,.12); color:var(--orange); }
.cal-alert-pip.reag { background:rgba(180,83,9,.1); color:var(--yellow); }
.cal-day-count { font-family:var(--display); font-size:22px; font-weight:900; line-height:1; margin:1px 0 3px; }
.cal-load-bar { height:3px; border-radius:2px; margin-bottom:5px; }
.cal-mini-svc { font-size:9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.55; font-family:var(--mono); color:var(--text2); }
.cal-mini-svc.sem-eq  { color:var(--orange); }
.cal-mini-svc.reagend { color:var(--orange); opacity:.65; text-decoration:line-through; }
.cal-mini-svc.exec    { color:var(--green); opacity:.7; }
.cal-legend { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:10px 16px; margin-bottom:12px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.cal-legend-item { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:4px; }
.cal-stat-chip {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 99px;
  padding: 2px 9px;
  color: var(--text2);
  white-space: nowrap;
}
/* Heat map: fundo sutil por nível de carga */
.cal-cell.load-leve   { background: rgba(22,163,74,.04); }
.cal-cell.load-medio  { background: rgba(217,119,6,.05); }
.cal-cell.load-alto   { background: rgba(220,38,38,.06); }
/* Fim de semana: número discretamente colorido */
.cal-cell.weekend .cal-day-num { color: var(--red); opacity: .7; }
/* Dia livre: estilo diferenciado */
.cal-cell.cal-livre { border-style: dashed; }
/* Mini tag "LIVRE" em dias vazios */
.cal-livre-tag {
  font-family: var(--mono);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text4);
  margin-top: 6px;
}
/* Destaque visual da célula ao passar (só dias com svc) */
.cal-cell.has-svc { cursor: pointer; }
.cal-cell.has-svc:hover {
  border-color: var(--blue) !important;
  box-shadow: 0 0 0 2px rgba(37,99,235,.1);
  transform: translateY(-1px);
}
/* Barra de carga proporcional */
.cal-load-bar { height: 3px; border-radius: 2px; margin-bottom: 5px; transition: width .3s; }
/* Stats panel acima do calendário */
.cal-month-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.cal-month-stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 10px 12px;
  text-align: center;
}
.cal-month-stat-val {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 3px;
}
.cal-month-stat-lbl {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
}
@media(max-width:900px) {
  .cal-grid { gap:3px; }
  .cal-cell { min-height:70px; padding:5px; }
  .cal-day-count { font-size:17px; }
  .cal-mini-svc { display:none; }
  .cal-nav-btn { padding:6px 10px; font-size:11px; }
  .cal-month-stats { grid-template-columns: repeat(3,1fr); }
  .cal-month-stat-val { font-size:18px; }
}

#tecnicos-container {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 8px;
}

#tecnicos-container label {
display: flex;
gap: 6px;
}
